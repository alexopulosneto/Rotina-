<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Péricles ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Cole aqui todo aquele bloco <style> que você já tem no seu arquivo */
        :root{ --bg:#080a0d;--s:#0f1218;--a:#00e5ff;--t:#e8edf2;--m:#5a6a7a;--ok:#7fff6b;--warn:#ffcc00;--danger:#ff4444;--r:12px; }
        body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;margin:0;}
        header{background:var(--s);padding:15px;display:flex;justify-content:space-between;border-bottom:1px solid #1e2530;}
        .logo{font-family:'Space Mono',monospace;font-weight:700;}
        .tabs{display:flex;background:var(--s);border-bottom:1px solid #1e2530;}
        .tab{flex:1;padding:12px;background:none;border:none;color:var(--m);font-family:'Space Mono';font-size:10px;cursor:pointer;}
        .tab.active{color:var(--a);border-bottom:2px solid var(--a);}
        main{padding:15px;}
        .page{display:none;}.active{display:block;}
        .sec{background:var(--s);padding:15px;border-radius:var(--r);margin-bottom:10px;border:1px solid #1e2530;}
        .chat-box{background:var(--s);border:1px solid #1e2530;border-radius:var(--r);margin-top:10px;}
        .chat-msgs{padding:15px;height:300px;overflow-y:auto;font-size:14px;}
        .chat-irow{display:flex;padding:10px;gap:10px;background:#161b22;}
        .cinp{flex:1;background:#080a0d;border:1px solid #1e2530;color:#fff;padding:8px;border-radius:5px;}
        .csend{background:var(--a);border:none;padding:8px 15px;border-radius:5px;font-weight:bold;cursor:pointer;}
        .error-msg{color:var(--danger);font-size:12px;margin-top:5px;display:none;}
    </style>
</head>
<body>

<header>
    <div class="logo">péricles<span style="color:var(--a)">.app</span></div>
    <div id="sync-dot" style="width:10px;height:10px;border-radius:50%;background:gray;"></div>
</header>

<div class="tabs">
    <button class="tab active" onclick="go('tempo')">⏰ Tempo</button>
    <button class="tab" onclick="go('dinheiro')">💰 Saldo</button>
    <button class="tab" onclick="go('ia')">⚡ IA</button>
</div>

<main>
    <div id="tempo" class="page active">
        <div class="sec"><h3>Rotina de Hoje</h3><p>Use o PC para importar dados ou cadastre abaixo.</p></div>
    </div>
    
    <div id="dinheiro" class="page">
        <div class="sec"><h3>Financeiro</h3><p>Sincronizado com Firebase.</p></div>
    </div>

    <div id="ia" class="page">
        <div class="chat-box">
            <div class="chat-msgs" id="chat-content"></div>
            <div id="ia-error" class="error-msg" style="padding:10px; background:#2a0808;"></div>
            <div class="chat-irow">
                <input type="text" id="user-input" class="cinp" placeholder="Pergunta pro Claude...">
                <button class="csend" onclick="falarComIA()">Enviar</button>
            </div>
        </div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    // 1. CONFIGURAÇÃO DO FIREBASE (Coloque seus dados aqui)
    const firebaseConfig = {
        apiKey: "SUA_API_KEY_AQUI",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        projectId: "SEU_PROJETO_ID",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "ID",
        appId: "APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. CONFIGURAÇÃO DO CLAUDE
    const CLAUDE_KEY = "SUA_CHAVE_SK_ANT_AQUI";

    // Função de Troca de Abas
    function go(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // FUNÇÃO PRINCIPAL: FALAR COM A IA (CORRIGIDA)
    async function falarComIA() {
        const input = document.getElementById('user-input');
        const content = document.getElementById('chat-content');
        const errorDiv = document.getElementById('ia-error');
        const msg = input.value;
        if(!msg) return;

        content.innerHTML += `<p><strong>Você:</strong> ${msg}</p>`;
        input.value = '';
        errorDiv.style.display = 'none';

        try {
            // Usamos um Proxy para evitar o erro de CORS do navegador
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': CLAUDE_KEY,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                    'dangerously-allow-browser': 'true' // Isso ajuda em alguns ambientes
                },
                body: JSON.stringify({
                    model: "claude-3-haiku-20240307",
                    max_tokens: 1024,
                    messages: [{role: "user", content: msg}]
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`Erro ${response.status}: ${errorData.error.message}`);
            }

            const data = await response.json();
            const respostaIA = data.content[0].text;
            content.innerHTML += `<p style="color:#00e5ff"><strong>Claude:</strong> ${respostaIA}</p>`;
            content.scrollTop = content.scrollHeight;

        } catch (err) {
            console.error(err);
            errorDiv.innerText = "Erro na conexão: " + err.message;
            errorDiv.style.display = 'block';
        }
    }
</script>
</body>
</html>
