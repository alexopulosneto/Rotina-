<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Péricles ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#080a0d;--s:#0f1218;--s2:#161b22;--b:#1e2530;--b2:#2a3340;
            --a:#00e5ff;--a2:#ff6b35;--t:#e8edf2;--m:#5a6a7a;
            --ok:#7fff6b;--warn:#ffcc00;--danger:#ff4444;--r:12px;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;}
        header{background:var(--s);border-bottom:1px solid var(--b);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
        .logo{font-family:'Space Mono',monospace;font-weight:700;font-size:.9rem;color:var(--t);}
        .logo .acc{color:var(--a);}
        .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);}
        .sync-dot.off{background:var(--danger);}
        .tabs{display:flex;background:var(--s);border-bottom:1px solid var(--b);overflow-x:auto;}
        .tab{flex:1;min-width:70px;font-family:'Space Mono',monospace;font-size:.65rem;padding:12px 5px;border:none;background:transparent;color:var(--m);cursor:pointer;white-space:nowrap;}
        .tab.active{color:var(--a);border-bottom:2px solid var(--a);}
        main{padding:14px;max-width:540px;margin:0 auto;}
        .page{display:none;}.page.active{display:block;}
        .sec{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:15px;margin-bottom:12px;}
        .chat-box{background:var(--s);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;}
        .chat-msgs{padding:12px;display:flex;flex-direction:column;gap:10px;height:400px;overflow-y:auto;background:var(--bg);}
        .bmsg{max-width:85%;padding:10px;border-radius:12px;font-size:0.9rem;line-height:1.4;}
        .bmsg-ia{align-self:flex-start;background:var(--s2);border:1px solid var(--b);}
        .bmsg-user{align-self:flex-end;background:var(--a);color:#000;font-weight:500;}
        .chat-input{display:flex;gap:8px;padding:10px;background:var(--s2);border-top:1px solid var(--b);}
        .cinp{flex:1;background:var(--s);border:1px solid var(--b);border-radius:8px;color:var(--t);padding:10px;outline:none;}
        .btn{background:var(--a);color:#000;border:none;border-radius:8px;padding:10px 15px;font-weight:700;cursor:pointer;}
        .notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ok);color:#000;padding:8px 20px;border-radius:20px;display:none;z-index:100;}
    </style>
</head>
<body>

<header>
    <div class="logo">péricles<span class="acc">.app</span></div>
    <div class="sync-dot" id="sync-dot"></div>
</header>

<div class="tabs">
    <button class="tab active" onclick="go('ia',this)">⚡ Assistente</button>
    <button class="tab" onclick="go('perfil',this)">👤 Perfil</button>
    <button class="tab" onclick="go('config',this)">⚙️ Config</button>
</div>

<main>
    <div class="page active" id="page-ia">
        <div class="sec" id="key-warning">
            <p style="color:var(--warn); font-size:0.8rem;">⚠️ Chave da API necessária para conversar.</p>
            <input type="password" id="api-key-input" class="cinp" style="margin-top:10px; width:100%;" placeholder="sk-ant-...">
            <button class="btn" style="margin-top:10px; width:100%;" onclick="saveKey()">Salvar Chave</button>
        </div>
        <div class="chat-box">
            <div class="chat-msgs" id="chat-msgs"></div>
            <div class="chat-input">
                <input type="text" id="chat-inp" class="cinp" placeholder="Sua mensagem...">
                <button class="btn" onclick="sendMsg()">→</button>
            </div>
        </div>
    </div>

    <div class="page" id="page-perfil">
        <div class="sec"><h2>O que eu sei sobre você:</h2><div id="perfil-list" style="margin-top:15px;"></div></div>
    </div>

    <div class="page" id="page-config">
        <div class="sec">
            <button class="btn" style="background:var(--danger); color:#fff;" onclick="clearData()">Apagar Tudo</button>
        </div>
    </div>
</main>

<div class="notif" id="notif"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAx_p_gYT_ovyk3YxcwPqHaMQ6x0E7WWCg",
        authDomain: "pericles-app-b3150.firebaseapp.com",
        projectId: "pericles-app-b3150",
        storageBucket: "pericles-app-b3150.firebasestorage.app",
        messagingSenderId: "20181792548",
        appId: "1:20181792548:web:2d688300f31427a19e25b1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const USER_ID = 'pericles_user';

    let state = { key: '', chat: [], perfil: {} };

    // FUNÇÕES DE UI
    window.go = (id, btn) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        btn.classList.add('active');
    };

    const addMsg = (role, text) => {
        const div = document.createElement('div');
        div.className = `bmsg bmsg-${role === 'user' ? 'user' : 'ia'}`;
        div.textContent = text;
        document.getElementById('chat-msgs').appendChild(div);
        document.getElementById('chat-msgs').scrollTop = 9999;
    };

    // BANCO DE DADOS
    async function loadData() {
        const snap = await getDoc(doc(db, 'usuarios', USER_ID));
        if (snap.exists()) {
            state = { ...state, ...snap.data() };
            if (state.key) document.getElementById('key-warning').style.display = 'none';
            state.chat.forEach(m => addMsg(m.role, m.content));
            renderPerfil();
        } else {
            addMsg('ia', 'Oi Péricles! Insira sua chave acima para começarmos.');
        }
    }

    window.saveKey = async () => {
        const val = document.getElementById('api-key-input').value;
        if (!val) return;
        state.key = val;
        await setDoc(doc(db, 'usuarios', USER_ID), state);
        document.getElementById('key-warning').style.display = 'none';
        alert("Chave salva!");
    };

    window.sendMsg = async () => {
        const inp = document.getElementById('chat-inp');
        const msg = inp.value.trim();
        if (!msg || !state.key) return;

        inp.value = '';
        addMsg('user', msg);
        state.chat.push({ role: 'user', content: msg });

        try {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': state.key,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-allow-browser': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 300,
                    system: "Você é o assistente pessoal do Péricles. Seja direto e amigável.",
                    messages: state.chat
                })
            });

            const data = await res.json();
            const reply = data.content[0].text;
            addMsg('ia', reply);
            state.chat.push({ role: 'assistant', content: reply });
            await setDoc(doc(db, 'usuarios', USER_ID), state);
        } catch (e) {
            addMsg('ia', 'Erro ao conectar. Verifique sua chave.');
        }
    };

    function renderPerfil() {
        const list = document.getElementById('perfil-list');
        list.innerHTML = Object.entries(state.perfil).map(([k, v]) => `<div><b>${k}:</b> ${v}</div>`).join('');
    }

    window.clearData = async () => {
        if(confirm("Apagar tudo?")) {
            await setDoc(doc(db, 'usuarios', USER_ID), { key: '', chat: [], perfil: {} });
            location.reload();
        }
    };

    loadData();
</script>
</body>
</html>
