<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Péricles ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0d;--s:#0f1218;--s2:#161b22;--b:#1e2530;--b2:#2a3340;
  --a:#00e5ff;--a2:#ff6b35;--t:#e8edf2;--m:#5a6a7a;
  --ok:#7fff6b;--warn:#ffcc00;--danger:#ff4444;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;}
header{background:var(--s);border-bottom:1px solid var(--b);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:.9rem;color:var(--t);}
.logo .acc{color:var(--a);}
.clk{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--m);background:var(--s2);border:1px solid var(--b);padding:4px 10px;border-radius:100px;}
.tabs{display:flex;background:var(--s);border-bottom:1px solid var(--b);}
.tab{flex:1;font-family:'Space Mono',monospace;font-size:.7rem;font-weight:700;padding:11px 4px;border:none;background:transparent;color:var(--m);cursor:pointer;}
.tab.active{color:var(--a);border-bottom:2px solid var(--a);}
main{padding:14px;max-width:540px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}

/* Cards de Topo */
.saldo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sc{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:13px;position:relative;}
.sc-label{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--m);text-transform:uppercase;margin-bottom:5px;}
.sc-val{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;}
.sc-val.time{color:var(--a);}
.sc-val.money{color:var(--a2);}

/* Seções */
.sec{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:13px;margin-bottom:10px;}
.sec-title{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--m);text-transform:uppercase;margin-bottom:10px;}
.sec-title span{color:var(--a);}

/* Blocos de Rotina */
.bloco{display:flex;gap:8px;margin-bottom:8px;}
.bchip{width:80px;background:var(--s2);border:1.5px solid var(--b);border-radius:10px;padding:8px;text-align:center;cursor:pointer;}
.bchip.on{border-color:var(--a);background:#0a1a1e;}
.bpanel{flex:1;background:var(--s2);border-radius:10px;padding:10px;}
.bpanel.off{opacity:0.3;pointer-events:none;}
.hf label{display:block;font-size:.55rem;color:var(--m);margin-bottom:2px;}
.hf input{width:100%;background:var(--bg);border:1px solid var(--b);color:#fff;padding:5px;border-radius:5px;}

/* Recomendações */
.rec-area{border-left:2px dashed var(--b2);padding-left:15px;margin:15px 0;}
.rec-box{background:linear-gradient(135deg,#0a1218,var(--s));border:1px solid var(--a);padding:12px;border-radius:10px;display:none;}
.rec-box.show{display:block;}

/* Saldo & Gráfico */
.money-main{display:flex;align-items:center;gap:15px;margin-bottom:15px;}
.pizza-wrap{position:relative;width:80px;height:80px;}
canvas{width:80px;height:80px;}
.saldo-info{flex:1;}

.fin-input-row{display:flex;gap:5px;margin-bottom:10px;}
.fin-input-row input{flex:1;background:var(--bg);border:1px solid var(--b);color:#fff;padding:8px;border-radius:8px;font-size:.8rem;}

.btn{width:100%;padding:12px;border-radius:10px;border:none;font-weight:700;font-family:'Space Mono',monospace;cursor:pointer;}
.btn-a{background:var(--a);color:#000;}
.btn-a2{background:var(--a2);color:#000;}
.btn-discreto{background:none;color:var(--m);font-size:.5rem;margin-top:10px;border:none;width:100%;text-transform:uppercase;}

.notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ok);padding:8px 20px;border-radius:100px;color:#000;display:none;font-size:.7rem;font-weight:700;}
</style>
</head>
<body>

<header>
  <div class="logo">péricles<span class="acc">.app</span></div>
  <div class="clk" id="clk">00:00</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="go('tempo',this)">⏰ Tempo</button>
  <button class="tab" onclick="go('dinheiro',this)">💰 Saldo</button>
</div>

<main>
  <div class="page active" id="page-tempo">
    <div class="saldo-grid">
      <div class="sc"><div class="sc-label">Livre</div><div class="sc-val time" id="h-livre">--h</div></div>
      <div class="sc"><div class="sc-label">Saldo</div><div class="sc-val money" id="s-topo">R$ 0</div></div>
    </div>

    <div class="sec">
      <div class="sec-title"><span>01</span> Sono</div>
      <div class="bloco">
        <div class="bchip" id="c-sono" onclick="togB('sono')">😴<br><small>SONO</small></div>
        <div class="bpanel off" id="p-sono">
          <div style="display:flex;gap:5px">
            <div class="hf"><label>DEITOU</label><input type="time" id="sono-i" oninput="calc()"></div>
            <div class="hf"><label>ACORDOU</label><input type="time" id="sono-f" oninput="calc()"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="rec-area">
      <div class="rec-box" id="rec-box">
        <div style="color:var(--a);font-weight:700;font-size:.7rem;margin-bottom:5px">⚡ RECOMENDAÇÃO</div>
        <div id="rec-lista" style="font-size:.8rem;color:var(--m)">Analise o dia para ver...</div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title"><span>02</span> Trabalho</div>
      <div class="bloco">
        <div class="bchip" id="c-t1" onclick="togB('t1')">🔧<br><small>MANHÃ</small></div>
        <div class="bpanel off" id="p-t1">
          <div style="display:flex;gap:5px">
            <input type="time" id="t1-i" oninput="calc()"> às <input type="time" id="t1-f" oninput="calc()">
          </div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title"><span>03</span> Academia</div>
      <div class="bloco">
        <div class="bchip" id="c-gym" onclick="togB('gym')">💪<br><small>TREINO</small></div>
        <div class="bpanel off" id="p-gym">
          <input type="time" id="gym-i" oninput="calc()"> às <input type="time" id="gym-f" oninput="calc()">
        </div>
      </div>
    </div>

    <button class="btn btn-a" onclick="analisar()">⚡ ANALISAR DIA</button>
    <button class="btn-discreto" onclick="addImp()">+ imprevisto (15m)</button>
  </div>

  <div class="page" id="page-dinheiro">
    <div class="sec">
      <div class="money-main">
        <div class="pizza-wrap"><canvas id="pizza"></canvas></div>
        <div class="saldo-info">
          <div class="sc-label">Disponível</div>
          <div class="sc-val money" id="s-disp" style="font-size:1.5rem">R$ 0,00</div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Entradas</div>
      <div class="fin-input-row">
        <input type="number" id="f-sal" placeholder="Salário" oninput="saveF()">
        <input type="number" id="f-ant" placeholder="Anterior" oninput="saveF()">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Gastos Avulsos</div>
      <div id="lista-gastos" style="font-size:.8rem;margin-bottom:10px"></div>
      <div class="fin-input-row">
        <input type="text" id="g-nome" placeholder="O quê?">
        <input type="number" id="g-valor" placeholder="R$">
      </div>
      <button class="btn btn-a2" onclick="addGasto()">+ LANÇAR GASTO</button>
    </div>
  </div>
</main>

<div class="notif" id="notif"></div>

<script type="module">
const $ = id => document.getElementById(id);
let state = { sal:0, ant:0, gastos:[], imp:0 };

window.go = (id,btn) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $( 'page-'+id ).classList.add('active');
  if(id==='dinheiro') renderF();
};

window.togB = id => {
  $('c-'+id).classList.toggle('on');
  $('p-'+id).classList.toggle('off');
  calc();
};

window.addImp = () => { state.imp += 15; calc(); alert('+15min registrados'); };

const toMin = t => { if(!t)return 0; const[h,m]=t.split(':').map(Number); return h*60+m; };

window.calc = () => {
  let ocupado = state.imp;
  const ids = ['sono','t1','gym'];
  ids.forEach(id => {
    if($('c-'+id).classList.contains('on')){
      let d = toMin($(`${id}-f`).value) - toMin($(`${id}-i`).value);
      if(d<0) d+=1440;
      ocupado += d;
    }
  });
  let livre = 1440 - ocupado;
  $('h-livre').textContent = Math.floor(livre/60)+'h'+(livre%60)+'m';
};

window.addGasto = () => {
  const n = $('g-nome').value, v = parseFloat($('g-valor').value);
  if(!n || !v) return;
  state.gastos.push({n, v});
  $('g-nome').value=''; $('g-valor').value='';
  renderF();
};

window.saveF = () => {
  state.sal = parseFloat($('f-sal').value) || 0;
  state.ant = parseFloat($('f-ant').value) || 0;
  renderF();
};

function renderF() {
  const total = state.sal + state.ant;
  const gastos = state.gastos.reduce((a,b)=>a+b.v, 0);
  const final = total - gastos;
  $('s-disp').textContent = 'R$ '+final.toLocaleString();
  $('s-topo').textContent = 'R$ '+final.toLocaleString();
  
  $('lista-gastos').innerHTML = state.gastos.map(g => `<div>${g.n}: -R$ ${g.v}</div>`).join('');
  drawPizza(gastos, total);
}

function drawPizza(g, t) {
  const c = $('pizza'); const ctx = c.getContext('2d');
  ctx.clearRect(0,0,80,80);
  const pct = t > 0 ? (g/t) : 0;
  // Fundo
  ctx.beginPath(); ctx.arc(40,40,35,0,7); ctx.strokeStyle='#1e2530'; ctx.lineWidth=8; ctx.stroke();
  // Gasto
  ctx.beginPath(); ctx.arc(40,40,35,-1.5, -1.5+(pct*6.3)); ctx.strokeStyle='#ff6b35'; ctx.lineWidth=8; ctx.stroke();
}

window.analisar = () => {
  $('rec-box').classList.add('show');
  $('rec-lista').innerHTML = "• SocialPro: 2 aulas<br>• Estudo PRF: 10 questões";
};

setInterval(()=>{ const n=new Date(); $('clk').textContent = n.getHours()+':'+String(n.getMinutes()).padStart(2,'0'); },1000);
</script>
</body>
</html>
